<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vite Alpine Tailwind</title>
        <meta
            name="description"
            content="A lightweight Vite + Alpine.js + Tailwind CSS SPA starter — plain HTML pages + pinecone-router."
        />

        <!-- OpenGraph -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Vite Alpine Tailwind" />
        <meta property="og:title" content="Vite Alpine Tailwind — Template" />
        <meta
            property="og:description"
            content="A lightweight client-side SPA starter combining Vite, Alpine.js, and Tailwind CSS v4."
        />
        <meta property="og:url" content="%SITE_URL%" />
        <meta property="og:image" content="%SITE_URL%og.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Vite Alpine Tailwind — Template" />
        <meta
            name="twitter:description"
            content="A lightweight client-side SPA starter combining Vite, Alpine.js, and Tailwind CSS v4."
        />
        <meta name="twitter:image" content="%SITE_URL%og.png" />

        <link rel="icon" href="/favicon.ico" />
        <link rel="stylesheet" href="/src/styles.css" />
        <script type="module" src="/src/app.ts"></script>
    </head>
    <body
        x-data="{ darkMode: $persist(window.matchMedia('(prefers-color-scheme: dark)').matches) }"
        :data-theme="darkMode ? 'dark' : 'light'"
        :class="darkMode ? 'dark bg-gray-900 text-white' : 'bg-white text-gray-900'"
        class="m-0 flex min-h-screen flex-col p-0 font-sans transition-colors duration-300"
        x-cloak
    >
        <!-- Persistent chrome — plain HTML + Alpine, present in the shell so it is
             never re-routed. The dark-mode toggle button reads `darkMode` from the
             <body> scope above (Alpine scopes inherit). -->
        <nav
            x-data="{ path: '' }"
            x-init="path = $router.context?.path ?? '';
                    document.addEventListener('pinecone:end', () => path = $router.context.path)"
            class="flex items-center justify-between px-8 py-6"
        >
            <a href="/" class="flex items-center">
                <span class="bg-gradient-to-r from-brand-1 to-brand-2 bg-clip-text text-2xl font-bold text-transparent">VAT</span>
                <span class="ml-2 text-lg opacity-80">Template</span>
            </a>

            <div class="hidden items-center space-x-8 md:flex">
                <a href="/" :class="path === '/' ? 'text-brand-1 font-semibold' : 'hover:text-brand-1 transition-colors'">Home</a>
                <a href="/blog" :class="path.startsWith('/blog') ? 'text-brand-1 font-semibold' : 'hover:text-brand-1 transition-colors'">Blog</a>
                <a href="/about" :class="path === '/about' ? 'text-brand-1 font-semibold' : 'hover:text-brand-1 transition-colors'">About</a>
                <a href="%REPO_URL%" target="_blank" rel="noopener" native class="transition-colors hover:text-gray-500">GitHub</a>
            </div>

            <button type="button" @click="darkMode = !darkMode" class="btn btn-ghost btn-circle" aria-label="Toggle dark mode">
                <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                </svg>
                <svg x-show="darkMode" x-cloak xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
                </svg>
            </button>
        </nav>

        <!-- pinecone-router loads the matched route's HTML file into here. -->
        <main id="app" class="flex flex-1 flex-col"></main>

        <footer class="mt-auto border-t border-gray-200 px-8 py-8 dark:border-gray-800">
            <div class="mx-auto flex max-w-6xl flex-col items-center justify-between md:flex-row">
                <div class="mb-4 md:mb-0">
                    <span class="opacity-70">Created by </span>
                    <a href="https://github.com/%AUTHOR%" target="_blank" rel="noopener" native class="link link-hover font-medium">%AUTHOR%</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="https://vitejs.dev" target="_blank" rel="noopener" native class="link link-hover opacity-70 hover:opacity-100">Vite</a>
                    <a href="https://alpinejs.dev" target="_blank" rel="noopener" native class="link link-hover opacity-70 hover:opacity-100">Alpine.js</a>
                    <a href="https://tailwindcss.com" target="_blank" rel="noopener" native class="link link-hover opacity-70 hover:opacity-100">Tailwind</a>
                    <a href="https://pinecone-router.github.io/router/" target="_blank" rel="noopener" native class="link link-hover opacity-70 hover:opacity-100">Pinecone</a>
                    <a href="%REPO_URL%" target="_blank" rel="noopener" native class="link link-hover opacity-70 hover:opacity-100">GitHub</a>
                </div>
            </div>
            <div class="mx-auto mt-6 max-w-6xl text-center text-sm opacity-60">
                <span data-testid="app-version" x-text="'v' + $store.app.version">v</span>
            </div>
        </footer>

        <!-- Route table. Each route loads a plain HTML page into #app (`.target.app`).
             The files live in src/pages/*.html and are served at /pages/*.html by the
             page-templates plugin (see vite.config.ts). URLs are authored without the
             base path — pinecone prepends the configured basePath. Add a route = add a
             src/pages/<x>.html file + a row here. `x-handler="[]"` silences pinecone's
             default notfound handler (which otherwise logs a ReferenceError). -->
        <template x-route="/" x-template.target.app="/pages/home.html"></template>
        <template x-route="/about" x-template.target.app="/pages/about.html"></template>
        <template x-route="/blog" x-template.target.app="/pages/blog.html"></template>
        <template x-route="/blog/:slug" x-template.target.app="/pages/post.html"></template>
        <template x-route="notfound" x-handler="[]" x-template.target.app="/pages/not-found.html"></template>
    </body>
</html>
